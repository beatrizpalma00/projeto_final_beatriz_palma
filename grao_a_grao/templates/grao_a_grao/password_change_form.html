{% extends 'grao_a_grao/base.html' %}

{% block title %}Alterar Password - Grão a Grão{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05);">
    <h2 style="color: #636b2f; text-align: center; margin-bottom: 25px; font-weight: 800;"><span style="margin-right: 15px;">🔒</span>Alterar Password</h2>
    {# Ajustado para a cor #444 para consistência #}
    <p style="color: #444; font-size: 0.9em; margin-bottom: 20px;">
        Por favor, introduz a tua password atual e depois a nova.
    </p>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="background: #556B2F; color: white; border: none; padding: 12px; border-radius: 30px; width: 100%; font-weight: bold; cursor: pointer; margin-top: 10px;">
            Atualizar Password
        </button>
    </form>
</div>
{% endblock %}
