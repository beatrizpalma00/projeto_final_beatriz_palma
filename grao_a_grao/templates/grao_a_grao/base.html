<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Grão a Grão{% endblock %}</title>
    <style>
        /* CSS Geral para todo o site */
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; line-height: 1.6; color: #333; }
        nav { background: #27ae60; padding: 1rem; color: white; display: flex; justify-content: space-between; align-items: center; }
        nav a { color: white; text-decoration: none; margin-left: 15px; font-weight: bold; }
        .container { padding: 20px; max-width: 1000px; margin: auto; }
        footer { text-align: center; padding: 20px; font-size: 0.8rem; color: #777; border-top: 1px solid #eee; margin-top: 40px; }
        .logo { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Grão a Grão</div>
        <div>
            <a href="{% url 'home' %}">Início</a>
            <a href="{% url 'lista_receitas' %}">Receitas</a>
            </div>
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

    <footer>
        &copy; 2024 Grão a Grão - O teu guia de receitas sustentáveis
    </footer>

</body>
</html>
