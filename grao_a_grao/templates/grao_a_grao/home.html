<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grão a Grão - Gestão de Receitas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-dark bg-success mb-4">
        <div class="container">
            <span class="navbar-brand mb-0 h1">Grão a Grão</span>
        </div>
    </nav>

    <div class="container text-center">
        <div class="p-5 mb-4 bg-white rounded-3 shadow-sm">
            <h1 class="display-5 fw-bold text-success">Olá!</h1>
            <p class="col-md-8 fs-4 mx-auto">
                Bem-vindo à tua plataforma de planeamento de refeições. 
                Aqui vais poder gerir as tuas receitas e criar listas de compras de forma inteligente.
            </p>
            <hr class="my-4">
            <div class="d-grid gap-2 d-sm-flex justify-content-sm-center">
                <button type="button" class="btn btn-success btn-lg px-4 gap-3">Ver Receitas</button>
                <button type="button" class="btn btn-outline-secondary btn-lg px-4">Planeamento</button>
            </div>
        </div>
    </div>

    <footer class="text-center text-muted mt-5">
        <small>&copy; Grão a Grão</small>
    </footer>

</body>
</html>
