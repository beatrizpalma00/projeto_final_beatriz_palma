{% extends 'grao_a_grao/base.html' %}

{% block title %}Entrar - Grão a Grão{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 40px auto; padding: 30px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);">
    <h2 style="color: #27ae60; text-align: center;">Entrar</h2>
    
    <form method="post" style="margin-top: 20px;">
        {% csrf_token %}
        
        {% for field in form %}
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">{{ field.label }}:</label>
                {{ field }}
            </div>
        {% endfor %}

        <button type="submit" style="background: #27ae60; color: white; border: none; padding: 12px; border-radius: 30px; cursor: pointer; width: 100%; font-weight: bold;">
            Entrar
        </button>
    </form>
    
    <p style="margin-top: 20px; text-align: center;">
        Ainda não tens conta? <a href="{% url 'registo' %}" style="color: #27ae60;">Regista-te aqui</a>.
    </p>
</div>

<style>
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
</style>
{% endblock %}
